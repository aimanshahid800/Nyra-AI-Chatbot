<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b61ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d4edd;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#7b61ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="60" cy="55" rx="35" ry="40" fill="url(#glow)" opacity="0.4"/>

  <!-- Main N shape - left stroke -->
  <path d="M 30 85 Q 28 60 32 40 Q 35 25 40 18"
        stroke="url(#grad1)" stroke-width="5" stroke-linecap="round" fill="none"
        filter="url(#outer-glow)" opacity="0.9"/>

  <!-- Main N shape - diagonal -->
  <path d="M 35 80 Q 50 60 65 45 Q 75 35 85 30"
        stroke="url(#grad2)" stroke-width="4.5" stroke-linecap="round" fill="none"
        filter="url(#outer-glow)" opacity="0.85"/>

  <!-- Main N shape - right stroke -->
  <path d="M 90 85 Q 88 60 84 40 Q 81 25 76 18"
        stroke="url(#grad1)" stroke-width="5" stroke-linecap="round" fill="none"
        filter="url(#outer-glow)" opacity="0.9"/>

  <!-- Flowing energy curves -->
  <path d="M 25 75 Q 45 55 60 50 Q 75 45 95 35"
        stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" fill="none"
        opacity="0.5" filter="url(#blur-glow)"/>

  <path d="M 20 90 Q 40 70 55 60 Q 70 50 100 30"
        stroke="url(#grad2)" stroke-width="1.5" stroke-linecap="round" fill="none"
        opacity="0.4" filter="url(#blur-glow)"/>

  <!-- Center orb -->
  <circle cx="60" cy="50" r="8" fill="url(#glow)" opacity="0.7" filter="url(#outer-glow)"/>
  <circle cx="60" cy="50" r="4" fill="#00d4ff" opacity="0.9"/>
  <circle cx="60" cy="50" r="2" fill="#ffffff" opacity="0.8"/>

  <!-- Particle effects -->
  <circle cx="35" cy="30" r="1.5" fill="#00d4ff" opacity="0.6"/>
  <circle cx="85" cy="25" r="1" fill="#7b61ff" opacity="0.5"/>
  <circle cx="25" cy="65" r="1.2" fill="#00b4d8" opacity="0.5"/>
  <circle cx="95" cy="70" r="1" fill="#9d4edd" opacity="0.4"/>
  <circle cx="50" cy="20" r="0.8" fill="#00d4ff" opacity="0.4"/>
  <circle cx="70" cy="80" r="1.2" fill="#7b61ff" opacity="0.3"/>
</svg>
